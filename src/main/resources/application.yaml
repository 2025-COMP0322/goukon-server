spring:
  application:
    name: goukon-server

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521:xe}
    username: ${DB_USERNAME:system}
    password: ${DB_PASSWORD:tjdudrbs}
    driver-class-name: oracle.jdbc.OracleDriver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

  # ActiveMQ Configuration
  activemq:
    broker-url: ${ACTIVEMQ_BROKER_URL:vm://localhost?broker.persistent=false}
    in-memory: true

# JWT Configuration
jwt:
  access:
    secret: ${JWT_ACCESS_SECRET:66549c74aa0b71af12cfa735490d3c19}
    expired: ${JWT_ACCESS_EXPIRED:18000000}
  refresh:
    secret: ${JWT_REFRESH_SECRET:66549c74aa0b71af12cfa735490d3c19}
    expired: ${JWT_REFRESH_EXPIRED:180000000}

# Server Configuration
server:
  port: ${SERVER_PORT:8080}

# Logging
logging:
  level:
    com.kr.goukon: ${LOG_LEVEL:DEBUG}
    org.hibernate.SQL: ${LOG_LEVEL:DEBUG}
    org.springframework.jms: ${LOG_LEVEL:DEBUG}
